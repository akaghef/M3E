# PJ03 SelfDrive — sprint contracts (reframed: workflow engine dogfood)
# Old friction-observation tasks archived at tasks_v1_friction.yaml.bak

# =========================================================================
# Phase 0: 再設計成果物の確定
# plan.md は reframed 済み。Phase 0 成果物 4 本を独立ドキュメントに固定する。
# =========================================================================

- id: T-0-1
  phase: 0
  verb: finalize
  target: "最小 workflow state set"
  done_when:
    - "projects/PJ03_SelfDrive/docs/workflow_state_set.md exists"
    - "9 states documented: pending, ready, in_progress, eval_pending, blocked, sleeping, escalated, done, failed"
    - "each state has: meaning (1-2 lines), entry condition, exit condition, invariant"
    - "table cross-references plan.md §データ構造の最小案 WorkflowState.kind"
  eval_required: true
  eval_criteria:
    - "state coverage is exhaustive (no stop reason falls outside the 9 states)"
    - "state boundaries are disjoint (no overlap in meaning)"
    - "invariants are falsifiable (can be checked mechanically)"
  parallelizable: true
  scope: "projects/PJ03_SelfDrive/docs"
  facet: design
  round_max: 3
  dependencies: []
  linked_review: null

- id: T-0-2
  phase: 0
  verb: enumerate
  target: "allowed workflow edges"
  done_when:
    - "projects/PJ03_SelfDrive/docs/workflow_edges.md exists"
    - "all 10 edges from plan.md §基本遷移 are tabulated"
    - "each row has: edge_id, source_state, target_state, condition, trigger (machine/human/timer)"
    - "unreachable state combinations are listed as explicit rejections"
  eval_required: true
  eval_criteria:
    - "edges are consistent with T-0-1 state set"
    - "every state (except failed) has at least one incoming and outgoing edge"
    - "human approval edges are flagged distinctly from machine edges"
  parallelizable: true
  scope: "projects/PJ03_SelfDrive/docs"
  facet: design
  round_max: 3
  dependencies: []
  linked_review: null

- id: T-0-3
  phase: 0
  verb: map
  target: "現行資産 → workflow element"
  done_when:
    - "projects/PJ03_SelfDrive/docs/legacy_asset_mapping.md exists"
    - "mapping table covers: tasks.yaml, resume-cheatsheet.md, reviews/Qn_*.md, ScheduleWakeup, SessionStart/PostCompact/Stop hooks, sub-pj-do"
    - "each asset row maps to: state(s) it writes, edge(s) it triggers, checkpoint role"
    - "gaps (assets not yet mapped) are explicitly listed"
  eval_required: true
  eval_criteria:
    - "mapping is verifiable against actual file contents (cite paths)"
    - "no invented assets"
    - "coverage of tentative runtime hosts from Qn_initial (ScheduleWakeup + CronCreate) is explicit"
  parallelizable: true
  scope: "projects/PJ03_SelfDrive/docs"
  facet: design
  round_max: 3
  dependencies: []
  linked_review: null

- id: T-0-4
  phase: 0
  verb: taxonomize
  target: "stop reason"
  done_when:
    - "projects/PJ03_SelfDrive/docs/stop_reason_taxonomy.md exists"
    - "covers sub-pj-guard E1/E2/E3 + plan.md §S3 stop reasons"
    - "each stop reason maps to exactly one of: blocked, sleeping, escalated, failed"
    - "decision rubric is included (how to classify a new stop reason)"
  eval_required: true
  eval_criteria:
    - "mapping is mutually exclusive (one stop reason → one target state)"
    - "recovery path is named for each non-failed category"
    - "E1/E2/E3 are preserved as escalated (per sub-pj-guard contract)"
  parallelizable: true
  scope: "projects/PJ03_SelfDrive/docs"
  facet: design
  round_max: 3
  dependencies: []
  linked_review: null

- id: T-0-5
  phase: 0
  verb: gate-check
  target: "Phase 0 readiness for Gate 1"
  done_when:
    - "T-0-1..T-0-4 all done"
    - "plan.md 確定事項 section appended with: state set, edge list ref, legacy mapping ref, stop taxonomy ref"
    - "Qn_initial (runtime host choice) has a concrete resolution proposal for akaghef"
    - "reviews/ open count + tentative defaults summarized in resume-cheatsheet.md"
    - "Gate 1 readiness summary posted to chat (akaghef approves / rejects)"
  eval_required: false
  eval_criteria:
    - "a reader with no context can judge Gate 1 from plan.md 確定事項 alone"
  parallelizable: false
  scope: "projects/PJ03_SelfDrive"
  facet: gate
  round_max: 1
  dependencies: ["T-0-1", "T-0-2", "T-0-3", "T-0-4"]
  linked_review: null

# =========================================================================
# Phase 1: 最小 workflow engine
# dogfood target: PJ03 自身の 1 task を engine で進める（plan.md §S11）
# =========================================================================

- id: T-1-1
  phase: 1
  verb: define-types
  target: "TypeScript type skeletons for workflow engine"
  done_when:
    - "beta/src/shared/workflow_types.ts exists"
    - "exports: WorkflowState, WorkflowNode, WorkflowEdge, Checkpoint, RunContext (per plan.md §データ構造の最小案)"
    - "WorkflowState.kind uses the 9-state union from T-0-1"
    - "npm run build passes"
  eval_required: true
  eval_criteria:
    - "types are structurally identical to plan.md interfaces (no silent extensions)"
    - "naming follows beta/src/shared convention (see types.ts / scope_types.ts)"
    - "no runtime code added to workflow_types.ts (types + const only)"
  parallelizable: false
  scope: "beta/src/shared"
  facet: implementation
  round_max: 3
  dependencies: ["T-0-5"]
  linked_review: null

- id: T-1-2
  phase: 1
  verb: encode
  target: "1-task workflow as Node+Edge instance"
  done_when:
    - "projects/PJ03_SelfDrive/runtime/workflow_example.ts (or .json) exists"
    - "encodes one PJ03 task (e.g. T-1-3) as: WorkflowNode set + WorkflowEdge set"
    - "nodes cover generator, evaluator, router roles at minimum"
    - "edges cover pending → ready → in_progress → eval_pending → done + blocked escape"
  eval_required: true
  eval_criteria:
    - "encoded instance validates against types from T-1-1"
    - "the task is actually one from tasks.yaml (not a toy example)"
    - "graph has no orphan nodes or edges"
  parallelizable: false
  scope: "projects/PJ03_SelfDrive/runtime"
  facet: design
  round_max: 3
  dependencies: ["T-1-1"]
  linked_review: null

- id: T-1-3
  phase: 1
  verb: implement
  target: "state transition runner"
  done_when:
    - "beta/src/node/workflow_runner.ts exists"
    - "reads tasks.yaml → returns current Checkpoint per task"
    - "applies one step: given current state, select allowed edge, return next state"
    - "writes back updated status/round/last_feedback to tasks.yaml"
    - "npm run build passes"
  eval_required: true
  eval_criteria:
    - "runner rejects invalid edges (fail-closed per plan.md §S12 Guardrails)"
    - "writeback preserves YAML structure (no reordering, no field loss)"
    - "dry-run mode exists for non-destructive inspection"
  parallelizable: false
  scope: "beta/src/node"
  facet: implementation
  round_max: 3
  dependencies: ["T-1-1", "T-1-2"]
  linked_review: null

- id: T-1-4
  phase: 1
  verb: integrate
  target: "evaluator loop in runner"
  done_when:
    - "runner distinguishes generator vs evaluator nodes"
    - "pending → in_progress → eval_pending → done / back-to-in_progress cycle works"
    - "round increments on evaluator fail; round > round_max transitions to blocked"
    - "demo run on one synthetic task completes the full cycle"
  eval_required: true
  eval_criteria:
    - "evaluator verdict persists in last_feedback"
    - "round_max enforcement is exact (off-by-one checked)"
    - "blocked transition does not lose state (checkpoint stays intact)"
  parallelizable: false
  scope: "beta/src/node"
  facet: implementation
  round_max: 3
  dependencies: ["T-1-3"]
  linked_review: null

- id: T-1-5
  phase: 1
  verb: implement
  target: "checkpoint / resume"
  done_when:
    - "Checkpoint is persisted to tasks.yaml (currentState, round) + resume-cheatsheet.md (human summary)"
    - "runner can be invoked with --resume and continues from last checkpoint"
    - "PostCompact / SessionStart reload path documented (even if hook wiring is later)"
    - "resume test: kill runner mid-transition, relaunch, verify same node resumes"
  eval_required: true
  eval_criteria:
    - "checkpoint is idempotent (re-saving the same state is a no-op)"
    - "resume never double-fires a side effect (Generator is not re-run after success)"
    - "corrupt checkpoint produces a clear error, not silent reset"
  parallelizable: false
  scope: "beta/src/node"
  facet: implementation
  round_max: 3
  dependencies: ["T-1-4"]
  linked_review: null

- id: T-1-6
  phase: 1
  verb: dogfood
  target: "self-apply runner to one PJ03 task"
  done_when:
    - "runner executes at least one real PJ03 task (proposed: T-1-1 or a later Phase 2 task) end-to-end"
    - "tasks.yaml reflects actual state transitions written by runner, not manual edits"
    - "resume-cheatsheet.md is updated by runner, not by hand"
    - "dogfood log (projects/PJ03_SelfDrive/artifacts/dogfood_run_01.md) records observed transitions"
  eval_required: true
  eval_criteria:
    - "no manual tasks.yaml edit during the dogfood run"
    - "observed transitions match T-0-2 edge table"
    - "all 4 stop categories (blocked/sleeping/escalated/failed) are reachable, even if only one is hit this run"
  parallelizable: false
  scope: "projects/PJ03_SelfDrive"
  facet: implementation
  round_max: 3
  dependencies: ["T-1-5"]
  linked_review: null

- id: T-1-7
  phase: 1
  verb: gate-check
  target: "Phase 1 readiness for Gate 2 (REJECTED 2026-04-21; re-gate after T-1-8..T-1-11)"
  done_when:
    - "plan.md §成功基準 最小成功 5 項目を T-1-1..T-1-6 の artifact から根拠づきで評価"
    - "plan.md 確定事項 に Phase 1 結論を追記"
    - "Phase 2 (Hermes 改善ループ) の着手条件が整理されている"
    - "Gate 2 readiness summary posted to chat (akaghef approves / rejects)"
    - "Qn3_gate2_rework の P1..P4 すべて resolve"
  eval_required: false
  eval_criteria:
    - "a reader can confirm 最小成功 5 項目から plan.md + artifacts だけで判断できる"
    - "persistence gap / reducer-vs-engine / 条件 observable / example 降格 の 4 論点に明示的回答がある"
  parallelizable: false
  scope: "projects/PJ03_SelfDrive"
  facet: gate
  round_max: 1
  dependencies: ["T-1-6"]
  linked_review: "Qn3_gate2_rework"

# =========================================================================
# Phase 1.5: Gate 2 rework (Qn3 P1..P4) — 方針確定後に具体化
# =========================================================================

- id: T-1-8
  phase: 1
  verb: split
  target: "tasks.yaml / checkpoint JSON への責務分離 (P1)"
  done_when:
    - "projects/PJ03_SelfDrive/docs/checkpoint_schema.md が存在し、tasks.yaml vs checkpoint JSON のフィールド境界を表で明示"
    - "beta/src/shared/checkpoint_types.ts が存在し、CheckpointFile 型 (state, round, last_feedback, blocker, escalation_kind, wakeup_at, wakeup_mechanism, failure_reason, updated_at) を export"
    - "projects/PJ03_SelfDrive/runtime/checkpoints/{taskId}.json が全既存 task 分生成済み（T-0-1..T-1-7 + T-1-8..T-1-11）"
    - "tasks.yaml から status / round / last_feedback / blocker フィールドを除去（contract 部分のみ残す）"
    - "reducer が checkpoint JSON を read/write できる（旧 tasks.yaml writeback 経路は削除）"
    - "npm run build passes"
    - "restore test: 任意の WorkflowState kind について checkpoint JSON 書き込み → 読み戻しで invariant field が全て保存されることを 1 script で検証"
  eval_required: true
  eval_criteria:
    - "restore test が全 9 state について resume 情報の欠落なく round-trip（rework 完了条件の直接検査）"
    - "tasks.yaml からマシン状態が物理的に消えている（grep で確認）"
    - "checkpoint JSON は 1 task 1 ファイル、atomic write（tmp → rename）で永続化"
    - "旧 applyWriteback の regex surgical-replace 経路は撤去されているか、tasks.yaml の contract 部分のみを対象に縮退している"
  parallelizable: false
  scope: "beta/src/shared + projects/PJ03_SelfDrive/runtime/checkpoints"
  facet: implementation
  round_max: 3
  dependencies: ["T-1-6"]
  linked_review: "Qn3_gate2_rework"

- id: T-1-9
  phase: 1
  verb: rename
  target: "workflow_runner → workflow_reducer + CLI 分離 (P2)"
  done_when:
    - "beta/src/node/workflow_reducer.ts が存在（旧 workflow_runner.ts をベースに責務縮退）"
    - "reducer の公開 API は純粋関数 `reduce(state, signal, deps): {nextState, patch}` + persistence adapter `loadCheckpoint` / `saveCheckpoint`"
    - "CLI は beta/src/node/workflow_cli.ts に分離、reducer を import する薄い wrapper"
    - "旧 workflow_runner.ts は削除（履歴は git で参照）"
    - "docs/resume_protocol.md / docs/legacy_asset_mapping.md の 'runner' 言及を 'reducer' に更新"
    - "npm run build passes"
  eval_required: true
  eval_criteria:
    - "reducer の core 関数が Date / fs / subprocess を直接呼ばない（純粋性）"
    - "Generator / Evaluator 起動コードが含まれていない（責務境界の明示）"
    - "responsibility section を docs/reducer_responsibility.md に明記し、engine 化が Phase 2 の別 task である旨を記録"
  parallelizable: false
  scope: "beta/src/node"
  facet: implementation
  round_max: 3
  dependencies: ["T-1-8"]
  linked_review: "Qn3_gate2_rework"

- id: T-1-10
  phase: 1
  verb: inject
  target: "dependencies / linked_review / Clock による条件 observable 化 (P3)"
  done_when:
    - "tasks.yaml に dependencies (string[]) / linked_review (string | null) を追加、T-0-*/T-1-* 全 entry で実値を設定"
    - "beta/src/shared/clock.ts に Clock interface 定義 + SystemClock 実装 + FixedClock (test helper)"
    - "reducer が Clock / ReviewResolver / DependencyResolver を input として受ける（Date.now() 直参照禁止）"
    - "pickNextTask が dependencies resolver を使い依存 done のみを ready に昇格"
    - "E09 条件 (sleeping → ready) が clock.now() >= wakeup_at で自動判定"
    - "E12 / E13 / E15 が linked_review の resolution 状態を ReviewResolver 経由で観測"
    - "dependency 循環検出 (cycle detection) が実装され、循環検出時は明示 Error"
  eval_required: true
  eval_criteria:
    - "Clock の FixedClock を使った sleeping → ready の state transition が unit test で成立"
    - "循環依存を含むタスクセットを投入したとき cycle Error が発生する"
    - "linked_review が open のまま E12 を試みるとエラーまたは reject（review resolution が先行条件）"
    - "rework 完了条件: restore test が全 9 state で invariant field を round-trip（T-1-8 eval を上書きしない）"
  parallelizable: false
  scope: "beta/src"
  facet: implementation
  round_max: 3
  dependencies: ["T-1-8", "T-1-9"]
  linked_review: "Qn3_gate2_rework"

- id: T-1-11
  phase: 1
  verb: demote
  target: "workflow_example.json → docs/workflow_example.md 降格 (P4)"
  done_when:
    - "projects/PJ03_SelfDrive/docs/workflow_example.md が存在（旧 .json の内容を description 化、runtime 参照がないことを明記）"
    - "projects/PJ03_SelfDrive/runtime/workflow_example.json が削除されている（git mv or rm）"
    - "reducer / CLI / checkpoint 生成コードから .json への参照が 0（grep で確認）"
    - "docs/ 側に 将来 runtime fixture 必要時の復活方針を 1 段落記載"
  eval_required: false
  eval_criteria:
    - "二重表現（spec / 実装）が解消されている"
    - "runtime/ 配下に動かない spec object が残っていない"
  parallelizable: false
  scope: "projects/PJ03_SelfDrive"
  facet: design
  round_max: 1
  dependencies: ["T-1-10"]
  linked_review: "Qn3_gate2_rework"

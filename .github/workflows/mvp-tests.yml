name: MVP Tests

on:
  push:
    paths:
      - "mvp/**"
      - ".github/workflows/mvp-tests.yml"
  pull_request:
    paths:
      - "mvp/**"
      - ".github/workflows/mvp-tests.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mvp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

name: Agent Instruction Lint

on:
  push:
    paths:
      - "AGENTS.md"
      - "protocols/**"
      - "agent_instructions/**"
      - ".codex/skills/**"
      - ".claude/skills/**"
      - "scripts/hooks/**"
      - "scripts/ops/check-persistent-rule-gate.sh"
      - "tools/sync_agent_instructions.mjs"
      - ".github/workflows/agent-instruction-lint.yml"
  pull_request:
    paths:
      - "AGENTS.md"
      - "protocols/**"
      - "agent_instructions/**"
      - ".codex/skills/**"
      - ".claude/skills/**"
      - "scripts/hooks/**"
      - "scripts/ops/check-persistent-rule-gate.sh"
      - "tools/sync_agent_instructions.mjs"
      - ".github/workflows/agent-instruction-lint.yml"

jobs:
  agent-instruction-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check persistent rule gate
        run: bash scripts/ops/check-persistent-rule-gate.sh

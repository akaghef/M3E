<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapid MVP Viewer</title>
    <style>
      :root {
        --grid-bg: #f4f4f4;
        --grid-line: #e7e7e7;
        --ink: #262626;
        --accent: #7a35ff;
        --accent-soft: #efe7ff;
        --danger: #d64b4b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
        color: var(--ink);
        background: var(--grid-bg);
      }

      .app {
        min-height: 100vh;
        background-image:
          linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
        background-size: 46px 46px;
        padding: 14px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #ffffffd9;
        backdrop-filter: blur(4px);
        padding: 8px;
      }

      button,
      input[type="file"],
      input[type="text"] {
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        background: #fff;
        padding: 6px 10px;
        font-size: 13px;
      }

      input[type="text"] {
        min-width: 240px;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.danger {
        border-color: var(--danger);
        color: var(--danger);
      }

      .meta,
      .shortcuts,
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #5d5d5d;
      }

      .status {
        min-height: 18px;
      }

      .board {
        margin-top: 14px;
        border: 1px solid #dfdfdf;
        border-radius: 14px;
        background: #ffffff55;
        overflow: auto;
        min-height: 72vh;
      }

      svg {
        display: block;
      }

      .edge {
        fill: none;
        stroke-width: 4;
        stroke-linecap: round;
      }

      .root-box {
        fill: #fff;
        stroke: var(--accent);
        stroke-width: 4;
      }

      .node-hit {
        fill: transparent;
        cursor: pointer;
      }

      .node-hit.selected {
        fill: var(--accent-soft);
      }

      .label-root {
        font-size: 42px;
        font-weight: 500;
        fill: #232323;
        pointer-events: none;
      }

      .label-node {
        font-size: 44px;
        font-weight: 450;
        fill: #232323;
        pointer-events: none;
      }

      .collapsed-indicator {
        fill: #7f7f7f;
        font-size: 18px;
        pointer-events: none;
      }

      @media (max-width: 900px) {
        .label-root,
        .label-node {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="toolbar">
        <button id="load-default" class="primary">Load default sample</button>
        <button id="load-airplane">Load airplane demo</button>
        <input id="file-input" type="file" accept=".json,application/json" />
        <button id="add-child">Add child</button>
        <button id="add-sibling">Add sibling</button>
        <button id="toggle-collapse">Toggle collapse</button>
        <button id="delete-node" class="danger">Delete</button>
        <button id="download-btn">Download JSON</button>
        <input id="edit-input" type="text" placeholder="Selected node text" />
        <button id="apply-edit">Apply text</button>
      </div>
      <div id="meta" class="meta">No data loaded</div>
      <div class="shortcuts">
        Shortcuts:
        Click select |
        Tab add child |
        Enter add sibling |
        F2 edit |
        Space collapse |
        Delete remove |
        Arrow Up/Down visible traversal
      </div>
      <div id="status" class="status"></div>
      <div class="board">
        <svg id="canvas" width="1600" height="900" viewBox="0 0 1600 900"></svg>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("file-input");
      const loadDefaultBtn = document.getElementById("load-default");
      const loadAirplaneBtn = document.getElementById("load-airplane");
      const addChildBtn = document.getElementById("add-child");
      const addSiblingBtn = document.getElementById("add-sibling");
      const toggleCollapseBtn = document.getElementById("toggle-collapse");
      const deleteNodeBtn = document.getElementById("delete-node");
      const downloadBtn = document.getElementById("download-btn");
      const applyEditBtn = document.getElementById("apply-edit");
      const editInput = document.getElementById("edit-input");
      const metaEl = document.getElementById("meta");
      const statusEl = document.getElementById("status");
      const canvas = document.getElementById("canvas");

      const EDGE_COLORS = ["#7a35ff", "#e34ad7", "#5d3cff", "#a146ff", "#6d5dff"];
      const ROOT_FONT = 42;
      const NODE_FONT = 44;
      const ROOT_HEIGHT = 120;
      const COLUMN_GAP = 170;
      const LEAF_HEIGHT = 94;
      const SIBLING_GAP = 20;
      const LEFT_PAD = 80;
      const TOP_PAD = 90;
      const NODE_HIT_HEIGHT = 64;

      let doc = null;
      let visibleOrder = [];
      let statusTimer = null;

      function nowIso() {
        return new Date().toISOString();
      }

      function createEmptyDoc() {
        const rootId = newId();
        return {
          version: 1,
          savedAt: nowIso(),
          state: {
            rootId,
            selectedId: rootId,
            nodes: {
              [rootId]: {
                id: rootId,
                parentId: null,
                children: [],
                text: "Research Root",
                collapsed: false,
              },
            },
          },
        };
      }

      function ensureDocShape(payload) {
        const candidate = payload && payload.state ? payload : { version: 1, savedAt: nowIso(), state: payload };
        if (!candidate || !candidate.state || !candidate.state.nodes || !candidate.state.rootId) {
          throw new Error("Invalid JSON format");
        }
        if (!candidate.state.selectedId || !candidate.state.nodes[candidate.state.selectedId]) {
          candidate.state.selectedId = candidate.state.rootId;
        }
        return candidate;
      }

      function newId() {
        return `n_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function escapeXml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function textWidth(str, fontSize) {
        return Math.max(80, String(str || "").length * fontSize * 0.56);
      }

      function getNode(nodeId) {
        const node = doc.state.nodes[nodeId];
        if (!node) {
          throw new Error(`Node not found: ${nodeId}`);
        }
        return node;
      }

      function setStatus(message, isError = false) {
        clearTimeout(statusTimer);
        statusEl.textContent = message;
        statusEl.style.color = isError ? "var(--danger)" : "#5d5d5d";
        if (message) {
          statusTimer = setTimeout(() => {
            statusEl.textContent = "";
          }, 2500);
        }
      }

      function visibleChildren(node) {
        if (!node || node.collapsed) {
          return [];
        }
        return node.children || [];
      }

      function buildLayout(state) {
        const metrics = {};
        const depthOf = {};
        const depthMaxWidth = {};
        let maxDepth = 0;

        function visit(nodeId, depth) {
          const node = state.nodes[nodeId];
          if (!node) {
            return;
          }

          maxDepth = Math.max(maxDepth, depth);
          depthOf[nodeId] = depth;

          if (nodeId === state.rootId) {
            metrics[nodeId] = {
              w: Math.max(280, textWidth(node.text || "", ROOT_FONT) + 120),
              h: ROOT_HEIGHT,
            };
          } else {
            metrics[nodeId] = {
              w: textWidth(node.text || "", NODE_FONT) + 20,
              h: 56,
            };
          }

          depthMaxWidth[depth] = Math.max(depthMaxWidth[depth] || 0, metrics[nodeId].w);
          visibleChildren(node).forEach((childId) => visit(childId, depth + 1));
        }

        visit(state.rootId, 0);

        const xByDepth = {};
        let cursorX = LEFT_PAD;
        for (let d = 0; d <= maxDepth; d += 1) {
          xByDepth[d] = cursorX;
          cursorX += (depthMaxWidth[d] || 120) + COLUMN_GAP;
        }

        const subtreeHeightCache = {};
        function subtreeHeight(nodeId) {
          if (subtreeHeightCache[nodeId] !== undefined) {
            return subtreeHeightCache[nodeId];
          }

          const node = state.nodes[nodeId];
          if (!node) {
            return LEAF_HEIGHT;
          }

          const children = visibleChildren(node);
          if (children.length === 0) {
            subtreeHeightCache[nodeId] = LEAF_HEIGHT;
            return LEAF_HEIGHT;
          }

          let sum = 0;
          children.forEach((childId, i) => {
            sum += subtreeHeight(childId);
            if (i < children.length - 1) {
              sum += SIBLING_GAP;
            }
          });

          const result = Math.max(sum, metrics[nodeId].h + 24);
          subtreeHeightCache[nodeId] = result;
          return result;
        }

        const pos = {};
        const order = [];

        function place(nodeId, topY) {
          const node = state.nodes[nodeId];
          if (!node) {
            return LEAF_HEIGHT;
          }

          const depth = depthOf[nodeId] || 0;
          const h = subtreeHeight(nodeId);
          const centerY = topY + h / 2;

          pos[nodeId] = {
            x: xByDepth[depth],
            y: centerY,
            depth,
            w: metrics[nodeId].w,
            h: metrics[nodeId].h,
          };
          order.push(nodeId);

          let cursorY = topY;
          visibleChildren(node).forEach((childId, i, arr) => {
            const childH = place(childId, cursorY);
            cursorY += childH;
            if (i < arr.length - 1) {
              cursorY += SIBLING_GAP;
            }
          });

          return h;
        }

        const totalHeight = place(state.rootId, TOP_PAD);
        return {
          pos,
          order,
          totalHeight,
          totalWidth: cursorX + 220,
        };
      }

      function syncEditInput() {
        if (!doc) {
          editInput.value = "";
          return;
        }
        const selected = doc.state.nodes[doc.state.selectedId];
        editInput.value = selected ? selected.text || "" : "";
      }

      function render() {
        if (!doc) {
          metaEl.textContent = "No data loaded";
          canvas.innerHTML = "";
          return;
        }

        const state = doc.state;
        const layout = buildLayout(state);
        visibleOrder = layout.order;

        const pos = layout.pos;
        let maxX = Math.max(1400, layout.totalWidth);
        let maxY = Math.max(760, layout.totalHeight + TOP_PAD + 60);
        let edges = "";
        let nodes = "";

        function drawNode(nodeId) {
          const node = state.nodes[nodeId];
          const p = pos[nodeId];
          if (!node || !p) {
            return;
          }

          maxX = Math.max(maxX, p.x + p.w + 260);
          maxY = Math.max(maxY, p.y + p.h + 80);

          const children = visibleChildren(node);
          children.forEach((childId, i) => {
            const child = pos[childId];
            if (!child) {
              return;
            }

            const stroke = EDGE_COLORS[(p.depth + i) % EDGE_COLORS.length];
            const startX = p.x + p.w + 10;
            const startY = p.y;
            const endX = child.x - 14;
            const endY = child.y;
            const curve = Math.max(48, (endX - startX) * 0.45);
            const c1x = startX + curve;
            const c1y = startY;
            const c2x = endX - curve;
            const c2y = endY;
            edges += `<path class="edge" stroke="${stroke}" d="M ${startX} ${startY} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${endX} ${endY}" />`;
          });

          const hitClass = nodeId === state.selectedId ? "node-hit selected" : "node-hit";
          const hitX = nodeId === state.rootId ? p.x : p.x - 8;
          const hitY = p.y - NODE_HIT_HEIGHT / 2;
          const hitW = nodeId === state.rootId ? p.w : p.w + 36;
          nodes += `<rect class="${hitClass}" data-node-id="${nodeId}" x="${hitX}" y="${hitY}" width="${hitW}" height="${NODE_HIT_HEIGHT}" rx="12" />`;

          if (nodeId === state.rootId) {
            const label = escapeXml(node.text || "(empty)");
            const w = p.w;
            const h = p.h;
            const rx = 60;
            const x = p.x;
            const y = p.y - h / 2;
            nodes += `<rect class="root-box" x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" />`;
            nodes += `<text class="label-root" x="${x + w / 2}" y="${p.y}" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
          } else {
            const label = escapeXml(node.text || "(empty)");
            const selectedStyle = nodeId === state.selectedId ? " style=\"fill:#6f39ff;font-weight:600;\"" : "";
            nodes += `<text class="label-node" x="${p.x}" y="${p.y}" text-anchor="start" dominant-baseline="middle"${selectedStyle}>${label}</text>`;
          }

          if (node.collapsed && (node.children || []).length > 0) {
            const indicatorX = nodeId === state.rootId ? p.x + p.w + 16 : p.x + p.w + 10;
            nodes += `<text class="collapsed-indicator" x="${indicatorX}" y="${p.y}" dominant-baseline="middle">+</text>`;
          }

          children.forEach((cid) => drawNode(cid));
        }

        drawNode(state.rootId);

        canvas.setAttribute("width", String(maxX));
        canvas.setAttribute("height", String(maxY));
        canvas.setAttribute("viewBox", `0 0 ${maxX} ${maxY}`);
        canvas.innerHTML = `${edges}${nodes}`;

        const version = doc.version || "n/a";
        const savedAt = doc.savedAt || "n/a";
        const nodeCount = Object.keys(state.nodes).length;
        const selected = state.nodes[state.selectedId];
        metaEl.textContent = `version: ${version} | savedAt: ${savedAt} | nodes: ${nodeCount} | selected: ${selected ? selected.text : "n/a"}`;
        syncEditInput();
      }

      function selectNode(nodeId) {
        getNode(nodeId);
        doc.state.selectedId = nodeId;
        render();
      }

      function addChild() {
        const parentId = doc.state.selectedId;
        const parent = getNode(parentId);
        const id = newId();
        doc.state.nodes[id] = {
          id,
          parentId,
          children: [],
          text: "New Node",
          collapsed: false,
        };
        parent.children.push(id);
        parent.collapsed = false;
        doc.state.selectedId = id;
        doc.savedAt = nowIso();
        render();
        editInput.focus();
        editInput.select();
      }

      function addSibling() {
        const node = getNode(doc.state.selectedId);
        if (node.parentId === null) {
          addChild();
          return;
        }
        const parent = getNode(node.parentId);
        const currentIndex = parent.children.indexOf(node.id);
        const id = newId();
        doc.state.nodes[id] = {
          id,
          parentId: parent.id,
          children: [],
          text: "New Sibling",
          collapsed: false,
        };
        parent.children.splice(currentIndex + 1, 0, id);
        doc.state.selectedId = id;
        doc.savedAt = nowIso();
        render();
        editInput.focus();
        editInput.select();
      }

      function applyEdit() {
        const node = getNode(doc.state.selectedId);
        const next = String(editInput.value || "").trim();
        if (next === "") {
          setStatus("Node text cannot be empty.", true);
          syncEditInput();
          return;
        }
        if (node.text === next) {
          return;
        }
        node.text = next;
        doc.savedAt = nowIso();
        render();
      }

      function deleteSelected() {
        const node = getNode(doc.state.selectedId);
        if (node.parentId === null) {
          setStatus("Root node cannot be deleted.", true);
          return;
        }
        const parent = getNode(node.parentId);
        parent.children = parent.children.filter((id) => id !== node.id);
        const stack = [node.id];
        while (stack.length > 0) {
          const currentId = stack.pop();
          const current = doc.state.nodes[currentId];
          if (!current) {
            continue;
          }
          stack.push(...(current.children || []));
          delete doc.state.nodes[currentId];
        }
        doc.state.selectedId = parent.id;
        doc.savedAt = nowIso();
        render();
      }

      function toggleCollapse() {
        const node = getNode(doc.state.selectedId);
        if ((node.children || []).length === 0) {
          return;
        }
        node.collapsed = !node.collapsed;
        doc.savedAt = nowIso();
        render();
      }

      function downloadJson() {
        const blob = new Blob([JSON.stringify({ version: doc.version, savedAt: nowIso(), state: doc.state }, null, 2)], {
          type: "application/json;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = "rapid-edited.json";
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function selectRelative(offset) {
        if (!visibleOrder.length) {
          return;
        }
        const currentIndex = Math.max(0, visibleOrder.indexOf(doc.state.selectedId));
        const nextIndex = Math.min(visibleOrder.length - 1, Math.max(0, currentIndex + offset));
        selectNode(visibleOrder[nextIndex]);
      }

      function loadPayload(payload) {
        try {
          doc = ensureDocShape(payload);
          render();
          setStatus("Loaded.");
        } catch (err) {
          setStatus(err.message, true);
        }
      }

      loadDefaultBtn.addEventListener("click", async () => {
        try {
          const response = await fetch("./data/rapid-sample.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          loadPayload(payload);
        } catch (err) {
          setStatus(`Default load failed (${err.message}). Use file picker.`, true);
        }
      });

      loadAirplaneBtn.addEventListener("click", async () => {
        try {
          const response = await fetch("./data/airplane-parts-demo.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          loadPayload(payload);
          setStatus("Airplane demo loaded.");
        } catch (err) {
          setStatus(`Airplane demo load failed (${err.message}).`, true);
        }
      });

      fileInput.addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const payload = JSON.parse(reader.result);
            loadPayload(payload);
          } catch (err) {
            setStatus(`JSON parse error: ${err.message}`, true);
          }
        };
        reader.readAsText(file, "utf-8");
      });

      addChildBtn.addEventListener("click", () => {
        if (!doc) return;
        addChild();
      });

      addSiblingBtn.addEventListener("click", () => {
        if (!doc) return;
        addSibling();
      });

      toggleCollapseBtn.addEventListener("click", () => {
        if (!doc) return;
        toggleCollapse();
      });

      deleteNodeBtn.addEventListener("click", () => {
        if (!doc) return;
        deleteSelected();
      });

      downloadBtn.addEventListener("click", () => {
        if (!doc) return;
        downloadJson();
      });

      applyEditBtn.addEventListener("click", () => {
        if (!doc) return;
        applyEdit();
      });

      editInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          if (doc) {
            applyEdit();
          }
        }
      });

      canvas.addEventListener("click", (event) => {
        const nodeId = event.target && event.target.dataset ? event.target.dataset.nodeId : null;
        if (doc && nodeId) {
          selectNode(nodeId);
        }
      });

      document.addEventListener("keydown", (event) => {
        if (!doc) {
          return;
        }

        const activeTag = document.activeElement ? document.activeElement.tagName : "";
        const editingInput = activeTag === "INPUT" && document.activeElement === editInput;

        if (editingInput) {
          if (event.key === "Escape") {
            syncEditInput();
            canvas.focus?.();
          }
          return;
        }

        if (event.key === "Tab") {
          event.preventDefault();
          addChild();
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          addSibling();
          return;
        }

        if (event.key === "F2") {
          event.preventDefault();
          editInput.focus();
          editInput.select();
          return;
        }

        if (event.key === "Delete" || event.key === "Backspace") {
          event.preventDefault();
          deleteSelected();
          return;
        }

        if (event.key === " ") {
          event.preventDefault();
          toggleCollapse();
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          selectRelative(-1);
          return;
        }

        if (event.key === "ArrowDown") {
          event.preventDefault();
          selectRelative(1);
        }
      });

      loadPayload(createEmptyDoc());
    </script>
  </body>
</html>

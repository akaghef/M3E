<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapid MVP Viewer</title>
        <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <div class="app">
      <div class="toolbar">
        <button id="load-default" class="primary">Load default sample</button>
        <button id="load-airplane">Load airplane demo</button>
        <button id="load-aircraft-mm">Load aircraft.mm demo</button>
        <input id="file-input" type="file" accept=".json,.mm,application/json,text/xml,application/xml" />
        <button id="add-child">Add child</button>
        <button id="add-sibling">Add sibling</button>
        <button id="toggle-collapse">Toggle collapse</button>
        <button id="delete-node" class="danger">Delete</button>
        <button id="mark-reparent">Mark move node</button>
        <button id="apply-reparent">Move under selected</button>
        <button id="zoom-out">Zoom out</button>
        <button id="zoom-reset">100%</button>
        <button id="zoom-in">Zoom in</button>
        <button id="download-btn">Download JSON</button>
        <input id="edit-input" type="text" placeholder="Selected node text" />
        <button id="apply-edit">Apply text</button>
      </div>
      <div id="meta" class="meta">No data loaded</div>
      <div class="shortcuts">
        Shortcuts:
        Click select |
        Tab add child |
        Enter add sibling |
        F2 edit |
        Space collapse |
        Delete remove |
        Ctrl/Cmd + wheel zoom |
        Arrow Up/Down visible traversal
      </div>
      <div id="status" class="status"></div>
      <div id="board" class="board" tabindex="0">
        <svg id="canvas" width="1600" height="900" viewBox="0 0 1600 900"></svg>
      </div>
    </div>

        <script src="./viewer.tuning.js"></script>
        <script src="./viewer.js"></script>
  </body>
</html>

version: 0.1
id: m3e.scope_contract
owner: Map Manager
status: proposed
source_docs:
  product:
    - docs/03_Spec/Scope_and_Alias.md
    - docs/00_Home/Glossary.md
  protocols:
    - protocols/scope-operation-protocol.md
terms:
  scope: cognitive_and_editing_boundary
  scopen: make_existing_node_or_group_a_scope
  unscopen: remove_scope_boundary_preserving_content
must:
  - treat scope as cognitive boundary, not storage boundary
  - name scope purpose as view, edit, audit, or product structure before scopen
  - keep entity nodes in exactly one scope
  - use alias for cross-scope visibility without ownership move
  - preserve folder scope semantics
  - identify whether a scope is facet or internal subcategory
must_not:
  - create a scope only because a tree is visually large
  - create a scope without a purpose-bearing boundary
  - let worker scopen or unscopen without explicit handoff
  - duplicate entity nodes across scopes
  - use alias as a move operation
soft_guidelines:
  granularity:
    - semantic cohesion first
    - node count is only a smell
    - worker delegability matters
escalate_when:
  - scope purpose cannot be named
  - scope would hide required context
  - operation crosses facet boundary
  - move vs alias is unclear
verification:
  - ownership is clear
  - aliases point to entity nodes
  - worker assignment matches scope boundary

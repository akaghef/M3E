version: 0.1
id: m3e.write_contract
owner: Map Manager
status: proposed
source_docs:
  product:
    - docs/03_Spec/Data_Model.md
    - docs/03_Spec/Node_Path_Notation.md
  protocols:
    - protocols/map-write-protocol.md
    - protocols/layouting-protocol.md
steps:
  - identify_map
  - resolve_target_path_or_scope
  - classify_projection_or_native_write
  - read_current_state
  - classify_write_as_trivial_or_display_governed
  - decide_facet_and_display_intent_if_needed
  - mutate_in_memory
  - validate_invariants
  - write_state
  - verify_after_write
must:
  - read before write
  - keep projection formats separate from M3E storage
  - maintain bidirectional parent-child consistency
  - preserve root parentId null
  - preserve existing m3e:style keys when changing one style property
  - delete GraphLinks whose endpoint nodes are deleted
must_not:
  - overwrite full state from stale context
  - write unresolved ambiguous paths
  - convert `/` or Mermaid arrows into ownership edges by default
  - confuse edge with GraphLink
  - apply default difficulty coloring over explicit display-intent colors
  - leave orphan nodes or broken non-broken links
verification:
  - no orphan nodes
  - no cycles
  - all children exist
  - all GraphLink endpoints exist and are non-alias unless product spec changes
  - intended display policy is preserved
